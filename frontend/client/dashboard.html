<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UYEN - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Top Nav -->
    <nav class="navbar">
        <div class="nav-left">
            <button class="hamburger-btn" id="mobileMenuBtn">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="nav-brand" style="display: flex; align-items: center;">
                <img src="./images/logo.png" alt="UYEN Logo" style="height: 32px; width: auto;">
            </div>
            <div class="nav-links">
                <a href="./dashboard.html" class="nav-link active">อัพโหลดไฟล์</a>
            </div>
            <!-- Mobile Menu Dropdown -->
            <div class="mobile-nav-dropdown" id="mobileMenuDropdown">
                <a href="./dashboard.html" class="nav-link active">อัพโหลดไฟล์</a>
            </div>
        </div>
        <div class="nav-right">
            <span class="user-name" id="displayUserName">Jeerapat</span>
            <button class="btn-logout" onclick="window.location.href='./index.html'">LOG OUT</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="dashboard-grid">
            
            <!-- Left Column: Forms -->
            <div class="left-col">
                <div class="section-card">
                    <h2 class="section-title">อัพโหลดไฟล์</h2>
                    <div class="upload-zone" id="uploadZone">
                        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                        <p style="font-weight: 500;">อัพโหลดไฟล์</p>
                        <p style="font-size: 0.75rem; color: #9ca3af;">(ขนาดไฟล์สูงสุดไม่เกิน 50 MB)</p>
                        <input type="file" id="fileInput" style="display: none;" accept=".pdf,.docx,.jpg,.png">
                    </div>
                </div>

                <div class="section-title" style="margin-top: 2rem;">รายละเอียดการพิมพ์</div>
                <form id="printDetailsForm">
                    <div class="form-group">
                        <label class="form-label">เลือกชนิดกระดาษ</label>
                        <select class="form-select custom-chevron" name="paper_type_id" id="paperTypeSelect">
                            <option value="">กำลังโหลด...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">เลือกขนาดกระดาษ</label>
                        <select class="form-select custom-chevron" name="paper_size_id" id="paperSizeSelect">
                            <option value="">กำลังโหลด...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">จำนวนชุด</label>
                        <div class="number-input-group">
                            <button type="button" class="btn-minus" onclick="this.nextElementSibling.value = Math.max(1, this.nextElementSibling.value - 1);">-</button>
                            <input type="number" class="form-control" name="copies" value="1" min="1">
                            <button type="button" class="btn-plus" onclick="this.previousElementSibling.value = parseInt(this.previousElementSibling.value) + 1;">+</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">หมายเหตุเพิ่มเติม</label>
                        <input type="text" class="form-control" name="notes" placeholder="ระบุรายละเอียดเพิ่มเติม (ถ้ามี)">
                    </div>
                </form>
            </div>

            <!-- Right Column: Schedule -->
            <div class="right-col">
                <div class="schedule-card">
                    <h2 class="section-title" style="margin-bottom: 0.5rem;">เลือกวันรับงานพิมพ์</h2>
                    <p style="font-size: 0.75rem; color: #9ca3af; margin-bottom: 1rem;">หมายเหตุ: สั่งล่วงหน้าได้ไม่เกิน 1 วัน</p>
                    
                    <!-- Calendar Interactive -->
                    <input type="hidden" name="pickup_date" id="pickupDateInput" value="">
                    <div style="border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; margin-bottom: 2rem; background: #fff; user-select: none;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:1rem; font-weight:500; align-items: center;">
                            <span style="cursor:pointer; padding: 0 10px;" id="prevMonth">&lt;</span>
                            <span id="monthYearDisplay"></span> 
                            <span style="cursor:pointer; padding: 0 10px;" id="nextMonth">&gt;</span>
                        </div>
                        <div style="display:grid; grid-template-columns: repeat(7, 1fr); text-align:center; gap: 0.5rem; font-size:0.875rem; margin-bottom: 0.5rem; color:#9ca3af;">
                            <div style="color:var(--danger-color)">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div>
                        </div>
                        <div id="calendarDays" style="display:grid; grid-template-columns: repeat(7, 1fr); text-align:center; gap: 0.5rem; font-size:0.875rem;">
                            <!-- JavaScript will generate days here -->
                        </div>
                    </div>

                    <h2 class="section-title">เลือกเวลาที่ต้องการรับงานพิมพ์</h2>
                    <select class="form-select custom-chevron" name="pickup_time" id="timeInput" style="width: 100%; margin-bottom: 1rem;">
                        <option value="09:00">09:00 น.</option>
                        <option value="09:30">09:30 น.</option>
                        <option value="10:00">10:00 น.</option>
                        <option value="10:30">10:30 น.</option>
                        <option value="11:00">11:00 น.</option>
                        <option value="11:30" selected>11:30 น.</option>
                        <option value="12:00">12:00 น.</option>
                        <option value="12:30">12:30 น.</option>
                        <option value="13:00">13:00 น.</option>
                        <option value="13:30">13:30 น.</option>
                        <option value="14:00">14:00 น.</option>
                        <option value="14:30">14:30 น.</option>
                        <option value="15:00">15:00 น.</option>
                        <option value="15:30">15:30 น.</option>
                        <option value="16:00">16:00 น.</option>
                        <option value="16:30">16:30 น.</option>
                        <option value="17:00">17:00 น.</option>
                    </select>
                </div>

                <div style="text-align: right; margin-top: 2rem;">
                    <button class="btn-primary" id="btnSubmitPrint">ส่งพิมพ์เอกสาร</button>
                </div>
            </div>

        </div>
    </main>
    
    <script src="./js/utils.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
