<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UYEN - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="auth-wrapper" style="padding: 2rem 0;">
        <div class="auth-card">
            <!-- Icon placeholder -->
            <div class="auth-logo" style="margin-bottom: 0.5rem;">
                <img src="./images/logo.png" alt="UYEN Logo" style="width: 200px; max-width: 100%; height: auto;">
            </div>
            
            <div class="auth-subtitle" style="margin-bottom: 1.5rem;">ENJOY PRINTING</div>
            
            <form id="registerForm" action="./index.html">
                <div class="form-group">
                    <label class="form-label">USERNAME</label>
                    <input type="text" class="form-control" name="username" id="regUsername" oninput="validateUsername(this)" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">EMAIL</label>
                    <input type="email" class="form-control" name="email" id="regEmail" oninput="validateEmail(this)" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">PASSWORD</label>
                    <div class="input-group password-wrapper">
                        <input type="password" class="form-control" name="password" id="regPassword" oninput="validatePassword(this)" required>
                        <button type="button" class="input-action" onclick="togglePassword('regPassword', this)">SHOW</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">CONFIRM PASSWORD</label>
                    <div class="input-group password-wrapper">
                        <input type="password" class="form-control" name="confirm_password" id="regConfirmPassword" oninput="validatePassword(this)" required>
                        <button type="button" class="input-action" onclick="togglePassword('regConfirmPassword', this)">SHOW</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone No.</label>
                    <input type="tel" class="form-control" name="phone" id="regPhone" oninput="formatPhoneNumber(this)" required>
                </div>
                
                <button type="submit" class="btn btn-success" style="margin-top: 1rem;">SIGN UP NOW</button>
            </form>
            
            <div class="auth-footer">
                HAVE ACCOUT ? <a href="./index.html">LOGIN HERE</a>
            </div>
        </div>
    </div>

    <script src="./js/utils.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
