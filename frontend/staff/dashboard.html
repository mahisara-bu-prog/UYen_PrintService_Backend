<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-YEN | Dashboard</title>
    <!-- Fonts: Inter and Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main class="dashboard-main">
        <!-- Header -->
        <div class="page-header">
            <h1 id="page-title">จัดการผู้ใช้งาน</h1>
        </div>

        <!-- Controls (Tabs + Search) -->
        <div class="page-controls">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(1)" id="tab1-btn">จัดการข้อมูลผู้ใช้งาน</button>
                <button class="tab-btn" onclick="switchTab(2)" id="tab2-btn">จัดการข้อมูลพนักงาน</button>
            </div>
            <button class="btn-outline-green hidden" id="btn-add-employee"
                onclick="showRegisterEmployeeModal()">ลงทะเบียนพนักงาน</button>
        </div>

        <!-- Table View 1 (Users) -->
        <div class="table-container" id="view-users">
            <table class="data-table">
                <thead>
                    <tr>
                        <th class="w-20">USER ID</th>
                        <th class="w-30">ชื่อผู้ใช้</th>
                        <th class="w-20">
                            <div class="flex-center gap-6">
                                สถานะ
                                <div class="flex-col gap-2">
                                    <button class="sort-up" onclick="sortByStatus('asc')" title="ปกติ">▲</button>
                                    <button class="sort-down" onclick="sortByStatus('desc')"
                                        title="Blacklist">▼</button>
                                </div>
                            </div>
                        </th>
                        <th class="w-30">ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <!-- Javascript will render rows here from state -->
                </tbody>
            </table>
        </div>

        <!-- Table View 2 (Employees) -->
        <div class="table-container hidden" id="view-employees">
            <table class="data-table">
                <thead>
                    <tr>
                        <th class="w-15">USER ID</th>
                        <th class="w-25">ชื่อผู้ใช้</th>
                        <th class="w-20">ตำแหน่ง</th>
                        <th class="w-15">เบอร์</th>
                        <th class="w-25">ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody id="employees-tbody">
                    <!-- Javascript will render rows here from state -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modals -->

    <!-- Delete Modal removed (Now generated by utils.js) -->

    <!-- Modals removed 
         All modals including Edit, Delete, Save, and Cancel are generated dynamically via JavaScript (utils.js or dashboard.js).
         This prevents users from bypassing UI visibility via CSS hidden attributes. -->
    <script src="js/mock-api.js"></script>
    <script src="js/utils.js"></script>
    <!-- Dashboard logic -->
    <script src="js/dashboard.js"></script>
    <script src="js/navbar.js"></script>
</body>

</html>
