<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-YEN | จัดการคลังวัสดุ</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="stylesheet" href="./css/styles.css">


</head>

<body>
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main class="dashboard-main">
        <!-- Header -->
        <div class="inventory-header">
            <h1 id="page-title" class="title-32">จัดการคลังวัสดุ</h1>
            <p class="subtitle-11">วัสดุ (จำนวนรายการของทั้งหมด) รายการ</p>
        </div>

        <!-- Summary, Search & Add Button Row -->
        <div class="flex-between mb-20">
            <div class="summary-count-group">
                <span class="text-20-bold">วัสดุ</span>
                <span id="total-item-count" class="count-28-red">7</span>
                <span class="text-20-bold">รายการ</span>
            </div>
            <div class="flex-middle gap-15">
                <button class="btn-action btn-save-success flex-center gap-6" onclick="openAddMaterialModal()">
                    <span class="fw-800 lh-1">+</span> เพิ่มวัสดุ
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-wrapper-blue">
            <table class="data-table inventory-table">
                <thead class="table-inventory-header">
                    <tr>
                        <th class="w-15 table-th-inventory table-th-left-30">วัสดุ</th>
                        <th class="w-15 table-th-inventory">ชนิดวัสดุ</th>
                        <th class="w-10 table-th-inventory">ประเภทวัสดุ</th>
                        <th class="w-15 table-th-inventory">
                            <div class="flex-center gap-4">
                                คลังคงเหลือ
                                <span class="sort-arrows-vertical">
                                    <span id="arrow-stock-up" class="sort-arrow-up" onclick="sortByStock('desc')"
                                        title="มากไปน้อย">▲</span>
                                    <span id="arrow-stock-down" class="sort-arrow-down" onclick="sortByStock('asc')"
                                        title="น้อยไปมาก">▼</span>
                                </span>
                            </div>
                        </th>
                        <th class="w-10 table-th-inventory">หน่วย</th>
                        <th class="w-15 table-th-inventory">ราคา / หน่วย</th>
                        <th class="w-10 table-th-inventory">จุดสั่งซื้อ</th>
                        <th class="w-10 table-th-inventory">
                            <div class="flex-center gap-4">
                                สถานะ
                                <span class="sort-arrows-vertical">
                                    <span id="arrow-status-up" class="sort-arrow-up sort-arrow-blue"
                                        onclick="sortByStatus('instock')" title="มีวัสดุก่อน">▲</span>
                                    <span id="arrow-status-down" class="sort-arrow-down" onclick="sortByStatus('low')"
                                        title="วัสดุใกล้หมดก่อน">▼</span>
                                </span>
                            </div>
                        </th>
                        <th class="w-20 table-th-inventory">ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows will be injected by mock API -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modals are dynamically injected by js/inventory.js to prevent users from altering CSS hidden attribute to bypass visibility constraints -->
    <!-- Status and Status Error Modals removed (Now generated by utils.js) -->




    <script src="js/mock-api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/inventory.js"></script>
    <!-- inventory.js loaded above handles all inventory logic -->
    <script src="js/navbar.js"></script>

    <!-- Confirm Modals removed (Now generated by utils.js) -->
</body>

</html>
